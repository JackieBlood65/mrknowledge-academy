<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bathroom</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f5f5f5;
      margin: 0;
      padding: 2em;
    }
    h2 {
      color: #333;
      margin-bottom: 1em;
    }
    img {
      max-width: 100%;
      height: auto;
      cursor: pointer;
      border: 2px solid #ccc;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h2>Touch the Toilet to Flush</h2>
  <img src="/assets/images/bathroom.png" alt="Bathroom" onclick="flushAndRedirect()">

  <script>
    function flushAndRedirect() {
      const audio = new Audio('/assets/sounds/toilet-flush.mp3');
      audio.play();
      audio.onended = () => {
        window.location.href = '/academy/elearning/index.html';
      };
    }
  </script>
</body>
</html>
