<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academy Entrance – MrKnowledge Academy</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f2f6fa;
            font-family: Arial, sans-serif;
        }

        /* Hero Bar */
        .hero {
            background: #1e73be;
            color: white;
            padding: 40px 20px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
        }

        /* Main Container */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            text-align: center;
        }

        /* Door Row */
        .door-row {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 40px;
        }

        /* Door */
        .door {
            width: 220px;
            height: 360px;
            background: #d9d9d9;
            border: 4px solid #555;
            border-radius: 6px;
            position: relative;
            cursor: pointer;
            transform-origin: left center;
            transition: transform 0.3s ease-out;
        }

        /* Door Opening Animation — UPDATED */
        .door.opening {
            transform: rotateY(22deg);
            transition: transform 1.5s ease-out;
        }

        /* Door Sign */
        .door-sign {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 10px 18px;
            border-radius: 4px;
            font-weight: bold;
            border: 2px solid #333;
        }

        /* Doorknob */
        .knob {
            width: 22px;
            height: 22px;
            background: gold;
            border-radius: 50%;
            position: absolute;
            left: 18px;
            top: 55%;
        }

        /* MrKnowledge Image */
        .mrk {
            margin-top: 50px;
            width: 260px;
        }
    </style>
</head>

<body>

    <div class="hero">
        Academy Entrance
    </div>

    <div class="container">

        <h2>Welcome to MrKnowledge Academy</h2>
        <p>Select a door to enter your training area.</p>

        <div class="door-row">

            <!-- E‑Learning Door -->
            <a href="/academy/elearning/index.html" class="door-link">
                <div class="door" id="door-elearning">
                    <div class="door-sign">E‑Learning</div>
                    <div class="knob"></div>
                </div>
            </a>

            <!-- Safety Meetings Door -->
            <a href="/academy/safety/index.html" class="door-link">
                <div class="door" id="door-safety">
                    <div class="door-sign">Safety Meetings</div>
                    <div class="knob"></div>
                </div>
            </a>

        </div>

        <img src="/assets/mrknowledge/mrknowledge-waistup.png" class="mrk" alt="MrKnowledge" />

    </div>

    <!-- Door Sound -->
    <audio id="doorSound" src="/assets/sounds/door-open.mp3"></audio>

    <script>
        const sound = document.getElementById("doorSound");

        document.querySelectorAll(".door-link").forEach(link => {
            link.addEventListener("click", function (e) {
                e.preventDefault();

                const door = this.querySelector(".door");
                door.classList.add("opening");

                sound.currentTime = 0;
                sound.play();

                setTimeout(() => {
                    window.location.href = this.getAttribute("href");
                }, 1700); // matches 1.5s animation
            });
        });
    </script>

</body>
</html>
